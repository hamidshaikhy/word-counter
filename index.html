<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>word counter</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="background">
      <h1 class="firstheadtext">WORDANALYTICS</h1>
    </div>
    <div class="container">
      <textarea class="textarea" name="" id="" placeholder="inter your text"></textarea>
      <section class="states">
        <section class="state">
          <span class="state-number word">0</span>
          <h2 class="second-heading">words</h2>
        </section>
        <section class="state">
          <span class="state-number characters">0</span>
          <h2 class="second-heading">characters</h2>
        </section>
        <section class="state">
          <span class="state-number twitter">280</span>
          <h2 class="second-heading">twitter</h2>
        </section>
        <section class="state">
          <span class="state-number facebook">2200</span>
          <h2 class="second-heading">facebook</h2>
        </section>
      </section>
    </div>
  </body>
</html>
